<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../nao-passei-direto/src/styles/login-style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">  
    <title>Não Passei Direto</title>
</head>
<body>
    <form action="#" autocomplete="off" method="post">
        <h2>Sistema de Alunos</h2>
        <div>
            
            <p>E-mail:</p> <label for="email"><input type="email" name="email" id="email" placeholder="seu@email.com"></label>
            <p>Senha:</p>  <label for="senha"><input type="password" name="senha" id="senha" placeholder="abcd"></label>
            <i class="bi bi-eye-fill" id="olho" onclick="ShowEye()"></i>   
            <br>
            <input type="submit" value="Login" class="botao">
        </div>
    </form>
    <script>
        // Função para obter o valor do campo de entrada
        function Submit (id) {
            const ValueEmail = document.getElementById(id)
            return ValueEmail.value
        }

        try {
            const Button = document.getElementById("botao")
            Button.addEventListener ("click", (event) => {
                 event.preventDefault()
                const email = Submit("email")
                const password = Submit("senha")
                if (!email || !password) {
                    document.getElementById("error").innerText = "Preencha todos os campos"
                }   else {
                    document.getElementById("error").innerText = "Login bem-sucedido"
                }
            }   
        )} catch (error) {
            console.error("Erro ao adicionar o evento de clique:", error)
        }


        // Função para mostrar ou ocultar a senha
        function ShowEye () {
            const inputPass = document.getElementById("senha")
            const olho = document.getElementById("olho")
            if (inputPass.type === "password") {
                inputPass.setAttribute("type", "text")
                olho.classList.replace ("bi-eye-fill", "bi-eye-slash-fill")
            } else {
                inputPass.setAttribute("type", "password")
                olho.classList.replace ("bi-eye-slash-fill", "bi-eye-fill")
            }
        } 

    </script>
</body>
</html>
